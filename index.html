<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#102a43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="短視頻服事小幫手">
  <title>短視頻服事小幫手</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">國度 321</p>
      <h1>短視頻服事小幫手</h1>
    </div>
    <button id="installButton" class="icon-button" hidden>安裝 App</button>
  </header>

  <main>
    <section class="hero">
      <div>
        <p id="todayLabel" class="date-label"></p>
        <h2 id="heroTitle">今天的任務</h2>
        <p id="heroSubtitle"></p>
      </div>
      <div class="progress-ring" id="progressRing" aria-label="完成進度">
        <strong id="progressValue">0/0</strong>
        <span>完成</span>
      </div>
    </section>

    <section class="quick-actions" aria-label="快捷功能">
      <button id="addTaskButton" class="action-card">
        <span class="action-icon">＋</span>
        <span><strong>新增任務</strong><small>建立自己的上傳項目</small></span>
      </button>
      <button id="importButton" class="action-card">
        <span class="action-icon">匯</span>
        <span><strong>匯入 Excel</strong><small>用表單更新目前排程</small></span>
      </button>
      <button id="notifyButton" class="action-card">
        <span class="action-icon">鈴</span>
        <span><strong>開啟通知</strong><small>查看今晚 8 點提醒</small></span>
      </button>
      <button id="calendarButton" class="action-card">
        <span class="action-icon">曆</span>
        <span><strong>加入行事曆</strong><small>每晚 8 點提醒</small></span>
      </button>
    </section>
    <input id="excelFile" type="file" accept=".xlsx,.xls" hidden>

    <section class="owner-filter">
      <label class="filter-label" for="ownerFilter">按人名查看服事</label>
      <select id="ownerFilter" class="filter-select" aria-label="按人名查看服事">
        <option value="all">全部同工</option>
      </select>
    </section>

    <nav class="tabs" aria-label="清單篩選">
      <button class="tab active" data-filter="today">今天</button>
      <button class="tab" data-filter="upcoming">接下來</button>
      <button class="tab" data-filter="all">全部</button>
    </nav>

    <section id="taskList" class="task-list" aria-live="polite"></section>
  </main>

  <dialog id="linkDialog">
    <form method="dialog" class="dialog-card">
      <h2>貼上影片連結</h2>
      <p id="dialogTaskName"></p>
      <input id="youtubeLink" type="url" inputmode="url" placeholder="https://youtu.be/..." autocomplete="off">
      <div class="dialog-actions">
        <button value="cancel" class="secondary">取消</button>
        <button id="saveLinkButton" value="default" class="primary">儲存</button>
      </div>
    </form>
  </dialog>

  <dialog id="taskDialog">
    <form id="taskForm" class="dialog-card">
      <h2 id="taskDialogTitle">新增自訂任務</h2>
      <label class="field">
        <span>上傳日期</span>
        <input id="customUploadDate" type="date" required>
      </label>
      <label class="field">
        <span>播放日期</span>
        <input id="customPlayDate" type="date">
      </label>
      <label class="field">
        <span>影片名稱</span>
        <input id="customType" type="text" placeholder="例如：特別聚會影片" required>
      </label>
      <label class="field">
        <span>期數／章節</span>
        <input id="customEpisode" type="text" placeholder="例如：第 12 期">
      </label>
      <label class="field">
        <span>負責同工</span>
        <input id="customOwner" type="text" placeholder="姓名">
      </label>
      <div class="dialog-actions">
        <button id="cancelTaskButton" type="button" class="secondary">取消</button>
        <button id="taskSubmitButton" type="submit" class="primary">新增任務</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
